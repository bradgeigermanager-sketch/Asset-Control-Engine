version: "3.8"
services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

  ui:
    build: ./ui
    ports:
      - "3000:3000"
    volumes:
      - ./ui/src:/app/src
    environment:
      - CHOKIDAR_USEPOLLING=true

  # Postgres and MinIO placeholders for production replacement
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assetdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
