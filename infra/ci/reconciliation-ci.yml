name: Reconciliation Tests
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          pip install pytest requests
      - name: Generate seed data
        run: python data/generate_seeds.py
      - name: Run API tests
        run: pytest -q
